name: Keep Alive

on:
  schedule:
    - cron: '*/14 * * * *' # Every 14 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Server
        run: |
          curl -s -f https://gate-intelligence.onrender.com/health || echo "Ping failed"
          curl -s -f https://gate-intelligence.onrender.com/ping || echo "Ping failed"
